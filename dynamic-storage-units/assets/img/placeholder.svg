<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f4f4f5"/>
  <!-- Box body -->
  <rect x="120" y="100" width="160" height="120" rx="6" fill="#d1d5db"/>
  <!-- Box top flaps -->
  <polygon points="120,100 200,80 280,100 200,120" fill="#9ca3af"/>
  <!-- Left flap -->
  <polygon points="120,100 200,120 200,80 160,70" fill="#b0b7c1"/>
  <!-- Right flap -->
  <polygon points="280,100 200,120 200,80 240,70" fill="#b0b7c1"/>
  <!-- Tape stripe -->
  <rect x="185" y="100" width="30" height="120" fill="#c4c9d4" opacity="0.5"/>
  <!-- Label area -->
  <rect x="145" y="135" width="110" height="50" rx="3" fill="#e5e7eb"/>
  <rect x="155" y="145" width="90" height="6" rx="2" fill="#9ca3af"/>
  <rect x="155" y="157" width="70" height="5" rx="2" fill="#9ca3af"/>
  <rect x="155" y="168" width="80" height="5" rx="2" fill="#9ca3af"/>
  <text x="200" y="255" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9ca3af">No image assigned</text>
</svg>
